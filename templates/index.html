<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OXY Chat</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- LOGIN -->
<div id="lock-screen" class="screen login-screen">
    <div class="login-box">
        <h1>🤖 OXY</h1>
        <p class="subtitle">Powered by Ismail Souilkate</p>

        <input type="text" id="username" placeholder="Username" class="input-field">
        <input type="password" id="password" placeholder="Password" class="input-field">

        <div id="error" class="error-message"></div>

        <button onclick="login()" class="btn btn-login">Login</button>
    </div>
</div>

<!-- CHAT -->
<div id="chat" class="screen chat-screen" style="display:none;">

    <div class="app-shell">

        <!-- MAIN -->
        <main class="chat-main" id="chatMain">

            <div class="chat-header">
                <div>
                    <h1>🤖 OXY</h1>
                    <p id="chat-title">New Chat</p>
                </div>

                <div class="header-info">
                    <span id="chat-username">User</span>
                    <button onclick="logout()" class="btn btn-logout">Logout</button>
                </div>
            </div>

            <div id="chat-box" class="chat-box"></div>

            <div class="chat-footer">
                <div class="input-area">
                    <input id="msg" class="msg-input" placeholder="Type message..."
                           onkeypress="handleKeyPress(event)">
                    <button onclick="send()" class="btn btn-send">Send</button>
                </div>

                
            </div>

        </main>

    </div>
</div>

<script src="/script.js"></script>
</body>
</html>
